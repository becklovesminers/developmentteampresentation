const STEPS = [
  {
    title: "This is the Buyer's Page",
    body: "What you're looking at is the same spreadsheet layout we use today — SO rows in blue, PO rows underneath, same nine columns. Reyvn's Buyer's Page should render exactly like this. The spreadsheet is the spec.",

    overlay: null,

  {
    title: "Alignment = confirmation status",

    overlay: null,
  },
  {
    title: "Column F is the order acceptance trigger",
    body: "This is the single most important column. When a value appears here, it means the vendor accepted the order. In Reyvn, this must emit a state change EVENT — not just save a value. It triggers alignment flip, status advance, and downstream automation.",

    overlay: null,

  {
    title: "The real complexity: Electrical Rack SO",
    body: "This single sales order has 9 PO lines across 9 different vendors. Some shipped. Some are waiting. One has a 5-week lead time. One was delivered with no tracking number. One is paid but waiting for a ship date. This is what the buyer manages every day — and this is just ONE order.",

const ALERTS = [

  { urgency: 3, vendor: "Dick Blick", po: "13624", msg: "Vendor cancelled — need replacement vendor", status: "Vendor cancelled", so: "EA 153655" },
  { urgency: 2, vendor: "Gordon Electric", po: "line 14 13616", msg: "Past estimated ship date (03/20) — request tracking", status: "Requested tracking", so: "EA 153638" },
  { urgency: 2, vendor: "Thompson Lightning", po: "line 13 13615", msg: "Paid but no estimated ship date — request ship date", status: "Requested ship date", so: "EA 153638" },
  { urgency: 2, vendor: "Global Industrial", po: "13607", msg: "RMA in progress — verify return shipped, check replacement", status: "RMA initiated", so: "EA 153623" },

  { urgency: 1, vendor: "Raycap", po: "line 4 13611", msg: "Waiting to ship — est. 05/06, system watching", status: "Waiting to ship", so: "EA 153638" },
];

function cellStyle(row, ci) {
  const base = {
    padding: "3px 5px", fontSize: 11, fontFamily: "'Consolas', 'Courier New', monospace",
    borderRight: "1px solid #D4D4D4", borderBottom: "1px solid #D4D4D4",
    width: WIDTHS[ci], minWidth: WIDTHS[ci], maxWidth: WIDTHS[ci],
    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
    lineHeight: "20px", height: 24, boxSizing: "border-box", transition: "all 0.3s",
  };
  if (row.t === "so") return { ...base, background: "#D9E1F2", fontWeight: 700, textAlign: ci===3?"center":"left", color: "#1A1A1A" };
  if (row.x === "cancel") return { ...base, background: "#FFCCCC", textAlign: ci===3?"center":(row.f?"right":"left"), color: "#4A1A1A" };
  if (row.x === "rma") return { ...base, background: "#FFD966", textAlign: ci===3?"center":(row.f?"right":"left"), color: "#4A3000" };
  return { ...base, background: "#FFFFFF", textAlign: ci===3?"center":(row.f?"right":"left"), color: "#1A1A1A" };
}

function StatusBadge({ status }) {
  if (!status) return null;
  const sl = status.toLowerCase();
  let bg = "#F5F5F0", color = "#444", border = "#DDD";
  if (sl.includes("shipped") || sl.includes("delivered")) { bg="#EAF3DE"; color="#27500A"; border="#3B6D11"; }
  else if (sl.includes("confirmed & paid")) { bg="#E1F5EE"; color="#085041"; border="#0F6E56"; }
  else if (sl.includes("waiting to ship")) { bg="#E1F5EE"; color="#085041"; border="#0F6E56"; }
  else if (sl.includes("cancelled")) { bg="#FCEBEB"; color="#791F1F"; border="#A32D2D"; }
  else if (sl.includes("rma")) { bg="#FFF3E0"; color="#633806"; border="#854F0B"; }
  else if (sl.includes("po submitted")) { bg="#E6F1FB"; color="#0C447C"; border="#185FA5"; }
  else if (sl.includes("paid w/o")) { bg="#FAEEDA"; color="#633806"; border="#854F0B"; }
  else if (sl.includes("requested")) { bg="#FAECE7"; color="#712B13"; border="#993C1D"; }
  return React.createElement('span', { style: { background: bg, color, border: `1px solid ${border}66`, padding: "1px 8px", borderRadius: 10, fontSize: 11, fontWeight: 500, whiteSpace: "nowrap" } }, status);
}

const ES_STEPS = [
  { name: "PO submitted", color: "#E6F1FB", border: "#185FA5", sub: "Email sent, clock starts" },
  { name: "Paid w/o confirmed", color: "#FAEEDA", border: "#854F0B", sub: "Optional — money moved, no order #" },
  { name: "Order acknowledged", color: "#FAEEDA", border: "#854F0B", sub: "Optional — have order #, not paid" },
  { name: "Confirmed & paid", color: "#E1F5EE", border: "#0F6E56", sub: "Green light — order is live" },
  { name: "Requested ship date", color: "#FAECE7", border: "#993C1D", sub: "Optional — asked vendor for date" },
  { name: "Waiting to ship", color: "#E1F5EE", border: "#0F6E56", sub: "System watches the clock" },
  { name: "Requested tracking", color: "#FAECE7", border: "#993C1D", sub: "Optional — chasing vendor" },
  { name: "Shipped", color: "#EAF3DE", border: "#3B6D11", sub: "Tracking entered — PO done" },
];

const WO_STEPS = [
  { name: "Confirmed & paid", color: "#E1F5EE", border: "#0F6E56", sub: "Instant at checkout" },
  { name: "Waiting to ship", color: "#E1F5EE", border: "#0F6E56", sub: "Optional — had ship date from checkout" },
  { name: "Shipped", color: "#EAF3DE", border: "#3B6D11", sub: "Tracking entered — PO done" },
];

function Demo() {
  const [step, setStep] = useState(0);
  const s = STEPS[step];
  const totalW = WIDTHS.reduce((a,b)=>a+b,0) + 32;

  const isHighlighted = (ri) => s.highlights && s.highlights.includes(ri);
  const isColHighlighted = (ci) => s.highlightCol === ci;

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#1A1A1A", minHeight: "100vh", display: "flex", flexDirection: "column" }}>

      {/* Top bar */}
      <div style={{ background: "#111", padding: "10px 20px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #333" }}>
        <div style={{ background: "#E8593C", width: 24, height: 24, borderRadius: 5, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, color: "#fff" }}>R</div>
        <span style={{ color: "#fff", fontSize: 15, fontWeight: 700 }}>Reyvn</span>
        <span style={{ color: "#666", fontSize: 13, marginLeft: 4 }}>Buyer Automation Module — Dev Team Walkthrough</span>
        <span style={{ color: "#555", fontSize: 12, marginLeft: "auto", fontFamily: "monospace" }}>Step {step + 1} of {STEPS.length}</span>
      </div>

      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        <div style={{ flex: 1, overflow: "auto", background: "#F0F0EC", position: "relative" }}>

            <div style={{ padding: 24 }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#1A1A1A", marginBottom: 4 }}>Priority Queue</div>

              {ALERTS.map((a, i) => {
                const uc = a.urgency === 3 ? { bg: "#FEF2F2", border: "#A32D2D", dot: "#E24B4A", label: "URGENT" } :

                  <div key={i} style={{ background: "#fff", border: `1px solid ${uc.border}22`, borderLeft: `3px solid ${uc.border}`, borderRadius: 8, padding: "12px 16px", marginBottom: 8, display: "flex", gap: 12, alignItems: "flex-start", animation: `fadeSlide 0.3s ease ${i*0.06}s both` }}>

                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 3, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, color: uc.border, background: uc.bg, padding: "1px 6px", borderRadius: 3, letterSpacing: "0.05em" }}>{uc.label}</span>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#1A1A1A" }}>{a.vendor}</span>
                        <StatusBadge status={a.status}/>
                      </div>
                      <div style={{ fontSize: 13, color: "#333", lineHeight: 1.4 }}>{a.msg}</div>
                      <div style={{ fontSize: 11, color: "#999", marginTop: 3 }}>{a.so} → {a.po}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : s.overlay === "es_flow" ? (
            <div style={{ padding: 24 }}>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#1A1A1A", marginBottom: 4 }}>ES (Email Submission) Status Flow</div>
              <div style={{ fontSize: 13, color: "#888", marginBottom: 20 }}>Each status is a defined state. The system enforces valid transitions. Optional statuses only appear when vendors drop the ball.</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 0, maxWidth: 500 }}>

                  <div key={i}>

              <div style={{ display: "flex", flexDirection: "column", gap: 0, maxWidth: 500 }}>

                  <div key={i}>
                    <div style={{ background: st.color, border: `2px solid ${st.border}`, borderRadius: 10, padding: "12px 18px", animation: `fadeSlide 0.3s ease ${i*0.08}s both` }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: st.border }}>{st.name}</div>

                <div style={{ fontWeight: 600, fontSize: 13, color: "#444" }}>Key difference from ES</div>
                <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>WO has no "Requested tracking" status. When a WO stalls, the alert system flags it. You check the vendor site or call — instant answer. No multi-day back-and-forth like ES.</div>
              </div>
              <div style={{ marginTop: 12, background: "#FCEBEB", border: "1px solid #A32D2D44", borderRadius: 8, padding: "10px 16px", maxWidth: 500 }}>

                      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", height: 26, lineHeight: "18px", boxSizing: "border-box",
                      transition: "background 0.3s",
                    }}>{col}</div>
                  ))}
                </div>
                {SHEET_ROWS.map((row, ri) => {

                      {KEYS.map((k, ci) => {
                        const st = cellStyle(row, ci);
                        if (isColHighlighted(ci)) st.background = row.t === "so" ? "#C5D0E8" : (row.x === "cancel" ? "#F0BBBB" : row.x === "rma" ? "#F0CC55" : "#FFF5EC");
                        return <div key={ci} style={st} title={row.t === "so" ? (ci===0?row.a:ci===1?row.b:"") : (row[k]||"")}>

            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", lineHeight: 1.3, marginBottom: 14 }}>{s.title}</div>

          </div>

          {/* Nav */}

            <button onClick={() => setStep(Math.max(0, step-1))} disabled={step===0}
              style={{ flex: 1, padding: "10px", background: step===0 ? "#222" : "#333", border: "none", borderRadius: 6, color: step===0 ? "#555" : "#fff", fontSize: 13, fontWeight: 600, cursor: step===0 ? "default" : "pointer" }}>
              ← Back
            </button>
            <button onClick={() => setStep(Math.min(STEPS.length-1, step+1))} disabled={step===STEPS.length-1}
              style={{ flex: 1, padding: "10px", background: step===STEPS.length-1 ? "#222" : "#E8593C", border: "none", borderRadius: 6, color: "#fff", fontSize: 13, fontWeight: 600, cursor: step===STEPS.length-1 ? "default" : "pointer" }}>
              Next →
            </button>
          </div>

          {/* Step dots */}
          <div style={{ padding: "8px 20px 14px", display: "flex", gap: 4, justifyContent: "center" }}>
            {STEPS.map((_, i) => (
              <div key={i} onClick={() => setStep(i)}
                style={{ width: i===step ? 20 : 8, height: 8, borderRadius: 4, background: i===step ? "#E8593C" : i < step ? "#555" : "#333", cursor: "pointer", transition: "all 0.2s" }}/>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<Demo />, document.getElementById('root'));
</script>
</body>
</html>
